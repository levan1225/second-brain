<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}secondbrain{% endblock %}</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/htmx.org@1.9.10"></script>
  <style>
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; }
    .sb-nav-link { @apply px-3 py-2 text-sm font-medium text-gray-700 hover:bg-gray-100 rounded-md; }
    .sb-nav-link.active { @apply bg-gray-900 text-white hover:bg-gray-900; }
    .sb-card { @apply bg-white border border-gray-200 rounded-lg shadow-sm; }
    .sb-tag { @apply inline-block text-xs px-2 py-0.5 rounded-full font-medium; }
    .sb-tag-red { @apply bg-red-100 text-red-800; }
    .sb-tag-yellow { @apply bg-yellow-100 text-yellow-800; }
    .sb-tag-blue { @apply bg-blue-100 text-blue-800; }
    .sb-tag-gray { @apply bg-gray-100 text-gray-700; }
    .sb-tag-green { @apply bg-green-100 text-green-800; }
  </style>
</head>
<body class="bg-gray-50 min-h-screen">
  <nav class="bg-white border-b border-gray-200 sticky top-0 z-10">
    <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
      <div class="flex items-center justify-between h-14">
        <div class="flex items-center gap-1">
          <a href="/" class="text-lg font-bold text-gray-900 mr-4">🧠 secondbrain</a>
          <a href="/" class="sb-nav-link {% if request.url.path == '/' %}active{% endif %}">Dashboard</a>
          <a href="/commitments" class="sb-nav-link {% if request.url.path.startswith('/commitments') %}active{% endif %}">Commitments</a>
          <a href="/people" class="sb-nav-link {% if request.url.path.startswith('/people') %}active{% endif %}">People</a>
          <a href="/briefings" class="sb-nav-link {% if request.url.path.startswith('/briefings') %}active{% endif %}">Briefings</a>
          <a href="/connectors" class="sb-nav-link {% if request.url.path.startswith('/connectors') %}active{% endif %}">Connectors</a>
          <a href="/daemon" class="sb-nav-link {% if request.url.path.startswith('/daemon') %}active{% endif %}">Daemon</a>
        </div>
        <div class="text-xs text-gray-400">v{{ version }}</div>
      </div>
    </div>
  </nav>
  <main class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-6">
    {% block content %}{% endblock %}
  </main>
</body>
</html>
